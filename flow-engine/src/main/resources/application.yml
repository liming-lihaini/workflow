server:
  port: 8080

spring:
  application:
    name: flow-engine
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:flow_engine.db
    username:
    password:
  # 启动时自动执行建表脚本（TRD §2.1，19 张表）
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: true
  # 未匹配到 Handler 时抛出异常，交由全局异常处理器返回统一 404
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  # 本地缓存（TRD §5.4，Caffeine）
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=1h

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
